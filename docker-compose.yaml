# version: '3.8'

services:
    db:
        image: postgres:15-alpine
        container_name: postgres
        restart: always
        environment:
            - POSTGRES_USER=user
            - POSTGRES_PASSWORD=12345678
            - POSTGRES_DB=rates
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U user -d rates" ]
            interval: 5s
            timeout: 5s
            retries: 5

    migrator:
        image: migrate/migrate
        container_name: migrator
        volumes:
            - ./migrations:/migrations:Z
        depends_on:
            db:
                condition: service_healthy
        command: -path=/migrations/ -database "postgres://user:12345678@db:5432/rates?sslmode=disable" up

    jaeger:
        image: jaegertracing/all-in-one:latest
        container_name: jaeger
        ports:
            - "16686:16686"
            - "4317:4317"
        environment:
            - COLLECTOR_OTLP_ENABLED=true

    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml:Z
        ports:
            - "9090:9090"

    app:
        build:
            context: .
            dockerfile: Dockerfile
        # command: ["./main", "-pg-host=db", "-pg-port=5432", "-pg-user=user", "-pg-dbname=rates", "-pg-password=12345678", "pg-sslmode=disable"]
        container_name: rates_app
        restart: always
        depends_on:
            migrator:
                condition: service_completed_successfully
        ports:
            - "50051:50051"
            - "9091:9090"
        environment:
            - GRINEX_URL=${GRINEX_URL}
            - ENV=${ENV}
            - PG_USERNAME=${PG_USERNAME}
            - PG_PASSWORD=${PG_PASSWORD}
            - PG_HOST=${PG_HOST}
            - PG_PORT=${PG_PORT}
            - PG_DBNAME=${PG_DBNAME}
            - PG_SSLMODE=${PG_SSLMODE}
            - GRPC_PORT=${GRPC_PORT}
            - OTEL_EXPORTER=${OTEL_EXPORTER}
            - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
            - METRICS_PORT=${METRICS_PORT}

volumes:
    postgres_data:
