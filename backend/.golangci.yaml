run:
  timeout: 5m
  skip-dirs:
    - internal/grpc/pb

linters-settings:
  govet:
    check-shadowing: true
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: package-comments
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  errcheck:
    check-type-assertions: true
    check-blank: true

linters:
  disable-all: true
  enable:
    - errcheck      # Проверка необработанных ошибок
    - gosimple      # Упрощение кода
    - govet         # Стандартный статический анализ Go
    - ineffassign   # Поиск неиспользуемых присваиваний
    - staticcheck   # Огромный набор проверок на логические ошибки
    - unused        # Поиск неиспользуемых констант, переменных, функций
    - revive        # Стилистический линтер
    - gocritic      # Советы по качеству кода
    - bodyclose     # Обязательно для resty (проверяет закрытие HTTP-тела)
    - sqlclosecheck # Обязательно для БД (проверяет закрытие строк sql.Rows)
    - asciicheck    # Проверка на наличие только ASCII символов в идентификаторах
    - exportloopref # Проверка ссылок на переменные цикла (частая ошибка в Go)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - revive
        - errcheck

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true